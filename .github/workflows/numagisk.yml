name: Build Nushell Magisk Module

on:
  workflow_dispatch: # 手动触发
  schedule:
    - cron: '0 0 * * 1' # 每周一自动检查更新

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get Latest Nushell Tag
        id: get_tag
        run: |
          TAG=$(curl -s https://api.github.com/repos/nushell/nushell/releases/latest | jq -r .tag_name)
          echo "TAG=$TAG" >> $GITHUB_OUTPUT
          echo "VERSION=${TAG#v}" >> $GITHUB_OUTPUT

      - name: Prepare Module Structure
        run: |
          mkdir -p nushell/system/bin
          
          # 写入 module.prop
          cat <<EOF > nushell/module.prop
          id=nushell
          name=Nushell for Android
          version=${{ steps.get_tag.outputs.TAG }}
          versionCode=$(date +%Y%m%d)
          author=GitHub Action
          description=A modern shell for the GitHub era. Powered by Nushell ${{ steps.get_tag.outputs.TAG }}.
          EOF

      - name: Download & Extract Nushell
        run: |
          # 下载 aarch64-linux-android 版本
          # https://github.com/nushell/nushell/releases/download/0.111.0/nu-0.111.0-aarch64-unknown-linux-musl.tar.gz
          URL="https://github.com/nushell/nushell/releases/download/${{ steps.get_tag.outputs.TAG }}/nu-${{ steps.get_tag.outputs.VERSION }}-aarch64-unknown-linux-musl.tar.gz"
          curl -L $URL -o nushell.tar.gz
          tar -xzf nushell.tar.gz
          
          # 将二进制文件移动到模块目录
          mv nu-*/nu nushell/system/bin/
          chmod +x nushell/system/bin/nu

      - name: Zip Module
        run: |
          cd nushell
          zip -r ../nushell-${{ steps.get_tag.outputs.TAG }}.zip ./*
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: nushell
          path: nushell-*.zip

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: github.event_name != 'pull_request'
        with:
          tag_name: ${{ steps.get_tag.outputs.TAG }}
          files: nushell-*.zip
          body: |
            Automated build of Nushell ${{ steps.get_tag.outputs.TAG }} for Magisk.
            Binary source: [Nushell Releases](https://github.com/nushell/nushell/releases)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
